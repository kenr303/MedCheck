name = "medcheck-price-worker"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# KV namespace — run `wrangler kv:namespace create PRICE_CACHE` to create it,
# then paste the returned id below.
[[kv_namespaces]]
binding = "PRICE_CACHE"
id = "648d45f7aa4d41dbbac74b39fe282fe1"

# Cron: 6:00 AM UTC and 6:00 PM UTC every day
[triggers]
crons = ["0 6 * * *", "0 18 * * *"]

[vars]
# REFRESH_SECRET is set as a secret (not here) via:
#   wrangler secret put REFRESH_SECRET
